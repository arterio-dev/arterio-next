<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Em Manutenção</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #f4f4f0;
      --white: #0a0a0a;
      --gray: #666;
      --line: 1px solid #ccc;
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    /* grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.15;
      pointer-events: none;
      z-index: 10;
    }

    .grid {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 2rem;
    }

    /* top bar */
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: var(--line);
      padding-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards;
    }

    .top .label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gray);
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--white);
      animation: pulse 2s ease-in-out infinite;
    }

    /* center */
    .center {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 1.5rem;
      padding: 3rem 0;
    }

    .big {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5rem, 18vw, 14rem);
      line-height: 0.9;
      letter-spacing: -0.02em;
      color: var(--white);
      opacity: 0;
      animation: fadeUp 0.8s ease 0.2s forwards;
    }

    .big span {
      display: block;
      color: transparent;
      -webkit-text-stroke: 1px var(--white);
    }

    .sub {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gray);
      opacity: 0;
      animation: fadeUp 0.8s ease 0.4s forwards;
    }

    /* progress bar */
    .bar-wrap {
      margin-top: 1rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.6s forwards;
    }

    .bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 0.5rem;
    }

    .bar-track {
      width: 100%;
      height: 1px;
      background: #ddd;
      position: relative;
      overflow: hidden;
    }

    .bar-fill {
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      background: var(--white);
      animation: load 3s cubic-bezier(0.4,0,0.2,1) 1s forwards;
      width: 0%;
    }

    /* bottom */
    .bottom {
      border-top: var(--line);
      padding-top: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.8s forwards;
    }

    .bottom .msg {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--gray);
    }

    .blink {
      animation: blink 1.2s step-end infinite;
    }

    /* animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    @keyframes load {
      to { width: 73%; }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="grid">

    <div class="top">
      <span class="label">Status — Manutenção</span>
      <div style="display:flex;align-items:center;gap:0.6rem;">
        <span class="label">Sistema offline</span>
        <div class="dot"></div>
      </div>
    </div>

    <div class="center">
      <div class="big">
        EM<span>MANU<br>TENÇÃO</span>
      </div>
      <p class="sub">Voltamos em breve &mdash; obrigado pela paciência</p>
      <div class="bar-wrap">
        <div class="bar-label">
          <span>Progresso</span>
          <span id="pct">0%</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" id="bar"></div>
        </div>
      </div>
    </div>

    <div class="bottom">
      <span class="msg">© 2025</span>
      <span class="msg">Aguarde<span class="blink">_</span></span>
    </div>

  </div>

  <script>
    // animate percentage counter
    const pct = document.getElementById('pct');
    const target = 73;
    const duration = 3000;
    const delay = 1000;
    let start = null;

    setTimeout(() => {
      function step(ts) {
        if (!start) start = ts;
        const p = Math.min((ts - start) / duration, 1);
        const ease = p < 0.5 ? 2*p*p : -1+(4-2*p)*p;
        pct.textContent = Math.round(ease * target) + '%';
        if (p < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }, delay);
  </script>
</body>
</html>
